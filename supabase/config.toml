# Supabase project config. Set project_id to your linked project ref
# (Project Settings → General) before running `supabase link`.
project_id = "glpenpal"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# In production set site_url to your domain, e.g. "https://buddyglp.com".
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "https://buddyglp.com", "https://www.buddyglp.com", "https://glpbuddy-app.netlify.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false   # set true in production; configure SMTP

[realtime]
enabled = true
