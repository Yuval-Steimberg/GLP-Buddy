# Netlify deployment config for the GLPenPal SPA.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: every route serves index.html so client-side routing
# (e.g. /chat/:id, /privacy) works on hard loads and refreshes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible security headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Never cache the service worker.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
