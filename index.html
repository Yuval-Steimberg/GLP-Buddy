<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#5e8c74" />
    <meta name="description" content="GLPenPal - get matched with someone going through a similar GLP journey." />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong
         palette. Must match the logic in src/lib/theme.ts. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('glpenpal-theme') || 'system';
          var dark = c === 'dark' || (c === 'system' && window.matchMedia
            && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          if (dark) {
            var m = document.querySelector('meta[name="theme-color"]');
            if (m) m.setAttribute('content', '#12181a');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>GLPenPal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
